name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature Request]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Overview

  - type: textarea
    id: suggestion
    attributes:
      label: What are you suggesting?
      placeholder: "Describe your feature idea..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Purpose

  - type: textarea
    id: why-needed
    attributes:
      label: Why is this needed?
      placeholder: "Explain why this feature would be valuable..."
    validations:
      required: true

  - type: textarea
    id: problem-solved
    attributes:
      label: What problem does it solve?
      placeholder: "Describe the problem or gap this addresses..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Details

  - type: textarea
    id: how-it-works
    attributes:
      label: How should it work?
      placeholder: "Describe the expected behavior or flow..."
    validations:
      required: true

  - type: input
    id: where-applies
    attributes:
      label: Where would it apply?
      description: "System, class, UI, etc."
      placeholder: "e.g. Combat system, Character creation, Inventory UI"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Alternatives

  - type: textarea
    id: alternatives
    attributes:
      label: Any alternative ways this might be implemented?
      placeholder: "Describe any other approaches you've considered..."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Extra info

  - type: textarea
    id: extra-info
    attributes:
      label: Anything else that might help
      description: "e.g. examples, references, etc."
      placeholder: "Any additional context..."
    validations:
      required: false
