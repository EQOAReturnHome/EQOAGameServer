name: General Bug Report
description: Report a general bug or issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Character Info
        If relevant, please provide your character details.

  - type: input
    id: character-name
    attributes:
      label: Name
      placeholder: "e.g. Aelindra"
    validations:
      required: true

  - type: input
    id: character-level
    attributes:
      label: Level
      placeholder: "e.g. 42"
    validations:
      required: true

  - type: dropdown
    id: character-class
    attributes:
      label: Class
      options:
        - Warrior
        - Mage
        - Rogue
        - Cleric
        - Ranger
        - Paladin
        - Bard
        - Necromancer
        - Monk
        - Druid
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Bug Details

  - type: input
    id: bug-location
    attributes:
      label: Where did this happen?
      description: "Zone, system, UI, etc."
      placeholder: "e.g. Inventory screen, Darkwood Forest, Trade window"
    validations:
      required: true

  - type: textarea
    id: what-doing
    attributes:
      label: What were you doing?
      placeholder: "Describe what you were doing when the bug occurred..."
    validations:
      required: true

  - type: textarea
    id: what-is-bug
    attributes:
      label: What is the bug?
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Steps to Reproduce

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Step by step, how can we reproduce this?
      value: |
        1. 
        2. 
        3. 
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## What went wrong

  - type: textarea
    id: what-went-wrong
    attributes:
      label: Explain the issue
      placeholder: "Describe what happened..."
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: What should have happened
      description: What you expected instead.
      placeholder: "Describe what you expected..."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Screenshots / Evidence

  - type: textarea
    id: screenshots
    attributes:
      label: If you have any, please include them.
      description: Drag and drop images or paste links here.
      placeholder: "Paste screenshots or links here..."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Extra info

  - type: textarea
    id: extra-info
    attributes:
      label: Anything else that might help
      description: "e.g. frequency, happens every time, only sometimes, etc."
      placeholder: "Any additional context..."
    validations:
      required: false
