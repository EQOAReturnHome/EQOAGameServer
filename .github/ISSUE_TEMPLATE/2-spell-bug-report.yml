name: Spell Bug Report
description: Report a bug or issue with a spell.
title: "[Spell Bug]: "
labels: ["bug", "spell"]
body:
  - type: markdown
    attributes:
      value: |
        ## Character Info
        Please provide your character details so we can reproduce the issue.

  - type: input
    id: character-name
    attributes:
      label: Name
      placeholder: "e.g. Aelindra"
    validations:
      required: true

  - type: input
    id: character-level
    attributes:
      label: Level
      placeholder: "e.g. 42"
    validations:
      required: true

  - type: dropdown
    id: character-class
    attributes:
      label: Class
      options:
        - Warrior
        - Mage
        - Rogue
        - Cleric
        - Ranger
        - Paladin
        - Bard
        - Necromancer
        - Monk
        - Druid
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Spell Details

  - type: input
    id: spell-name
    attributes:
      label: Spell name
      placeholder: "e.g. Greater Heal"
    validations:
      required: true

  - type: input
    id: spell-level
    attributes:
      label: Spell level
      placeholder: "e.g. 5"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Learning

  - type: dropdown
    id: able-to-learn
    attributes:
      label: Were you able to learn the spell?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: textarea
    id: learn-issue
    attributes:
      label: If not, what happened?
      placeholder: "Describe what went wrong when trying to learn the spell..."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Casting

  - type: dropdown
    id: able-to-cast
    attributes:
      label: Were you able to cast the spell?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: textarea
    id: cast-issue
    attributes:
      label: If not, what happened?
      placeholder: "Describe what went wrong when trying to cast the spell..."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Targeting / Scope

  - type: dropdown
    id: target-type
    attributes:
      label: Who can the spell be cast on?
      options:
        - Self
        - Single friendly target
        - Single enemy target
        - Group (friendly)
        - Area of effect (enemies)
        - Area of effect (all)
        - Pet / summon
        - Other
    validations:
      required: true

  - type: dropdown
    id: correct-target
    attributes:
      label: Did it cast on the correct target type?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Effect

  - type: textarea
    id: spell-actual-effect
    attributes:
      label: What did the spell actually do?
      placeholder: "Describe the effect you observed..."
    validations:
      required: true

  - type: dropdown
    id: matched-expected
    attributes:
      label: Did it match what you expected?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## What went wrong

  - type: textarea
    id: what-went-wrong
    attributes:
      label: Explain the issue
      placeholder: "Describe what happened..."
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: What should have happened
      description: What you expected instead.
      placeholder: "Describe what you expected..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Screenshots / Evidence

  - type: textarea
    id: screenshots
    attributes:
      label: If you have any, please include them.
      description: Drag and drop images or paste links here.
      placeholder: "Paste screenshots or links here..."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Extra info

  - type: textarea
    id: extra-info
    attributes:
      label: Anything else that might help
      description: "e.g. resists, fizzles, gear, buffs, etc."
      placeholder: "Any additional context..."
    validations:
      required: false
